# Lint + production build (no Playwright — no long-lived app server in CI).
name: Frontend quality

on:
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-quality.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-quality.yml"

defaults:
  run:
    working-directory: frontend

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          # Build-time public env placeholders (Clerk validates format; not used at runtime in CI)
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
          NEXT_PUBLIC_API_URL: http://127.0.0.1:9001
